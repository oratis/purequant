name: Publish to PyPI

# Publishes to PyPI via OIDC Trusted Publishing (no API token needed).
# One-time setup on PyPI: Project (or "pending publisher") -> add a Trusted
# Publisher: owner=oratis, repo=purequant, workflow=publish.yml.
# Then push a tag like v0.1.0 (or create a GitHub Release) to publish.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
